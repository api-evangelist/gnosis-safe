description: >-
  FOCUS-aligned FinOps for Safe Transaction Service API. The dominant cost driver
  is the monthly subscription tier (Builder free, Growth EUR 199/month, Scale EUR
  499+/month), with the billing unit being one API unit per HTTP request to any Safe
  Infrastructure endpoint. Webhook slots (Growth: 2, Scale: 10) add operational
  capability but are included in the subscription with no per-event overage charge.
  The Safe{Core} SDK (@safe-global/api-kit) and open-source safe-transaction-service
  are free; cost begins only when using the hosted Safe Infrastructure. Custom plans
  above Scale thresholds are negotiated directly with Safe. Pricing is denominated
  in EUR. Charges are assessed monthly with hard quota blocking (HTTP 429) rather
  than metered overage billing at the published tiers.
sources:
  - https://safe.global/api
  - https://docs.safe.global/core-api/how-to-use-api-keys
  - https://docs.safe.global/core-api/api-pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Safe Ecosystem Foundation
serviceCategory: Blockchain Infrastructure
billingModel:
  pricingCategory: Subscription (Tiered) + Custom Enterprise
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Tax
focusColumns:
  ServiceName: Safe Transaction Service
  ServiceCategory: Blockchain Infrastructure
  ProviderName: Safe
  PublisherName: Safe Ecosystem Foundation
